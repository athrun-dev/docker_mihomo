name: Build Docker image

on:
  schedule:
    - cron: "30 2 * * 6"
  workflow_dispatch:
    inputs:
      track:
        description: "Build track"
        required: true
        default: release
        type: choice
        options:
          - release
          - alpha

permissions:
  contents: read
  packages: write

env:
  UPSTREAM_REPOSITORY: MetaCubeX/mihomo
  REGISTRY: ghcr.io

jobs:
  prepare:
    name: Prepare build target
    runs-on: ubuntu-latest
    outputs:
      track: ${{ steps.target.outputs.track }}
      source_sha: ${{ steps.target.outputs.source_sha }}
      version: ${{ steps.target.outputs.version }}
      docker_tag: ${{ steps.target.outputs.docker_tag }}
      image: ${{ steps.target.outputs.image }}
    steps:
      - name: Resolve upstream ref
        id: target
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TRACK: ${{ github.event.inputs.track }}
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="${REGISTRY}/${owner}/mihomo"
          track="${INPUT_TRACK:-release}"
          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            track="release"
          fi
          case "${track}" in
            release)
              latest_release="$(curl -fsSL -H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${GH_TOKEN}" "https://api.github.com/repos/${UPSTREAM_REPOSITORY}/releases/latest")"
              version="$(jq -r '.tag_name' <<< "${latest_release}")"
              source_sha="$(git ls-remote --tags "https://github.com/${UPSTREAM_REPOSITORY}.git" "refs/tags/${version}^{}" | awk '{print $1}')"
              if [[ -z "${source_sha}" ]]; then
                source_sha="$(git ls-remote --tags "https://github.com/${UPSTREAM_REPOSITORY}.git" "refs/tags/${version}" | awk '{print $1}')"
              fi
              docker_tag="release-${version}"
              ;;
            alpha)
              version=""
              source_sha="$(git ls-remote --heads "https://github.com/${UPSTREAM_REPOSITORY}.git" refs/heads/Alpha | awk '{print $1}')"
              version="alpha-${source_sha:0:7}"
              docker_tag="${version}"
              ;;
            *)
              echo "Unsupported track: ${track}" >&2
              exit 1
              ;;
          esac
          if [[ -z "${source_sha}" || -z "${version}" ]]; then
            echo "Unable to resolve upstream ${track} ref" >&2
            exit 1
          fi
          echo "track=${track}" >> "${GITHUB_OUTPUT}"
          echo "source_sha=${source_sha}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "docker_tag=${docker_tag}" >> "${GITHUB_OUTPUT}"
          echo "image=${image}" >> "${GITHUB_OUTPUT}"
          echo "${image}:${docker_tag} <= ${UPSTREAM_REPOSITORY}@${source_sha}"

  build_binary:
    name: Build binary (${{ matrix.platform }})
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - {
              platform: linux/amd64,
              pair: linux-amd64,
              goarch: amd64,
              goamd64: v1,
            }
          - {
              platform: linux/arm/v6,
              pair: linux-arm-v6,
              goarch: arm,
              goarm: "6",
            }
          - {
              platform: linux/arm/v7,
              pair: linux-arm-v7,
              goarch: arm,
              goarm: "7",
            }
          - { platform: linux/arm64, pair: linux-arm64, goarch: arm64 }
    steps:
      - name: Checkout upstream
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPOSITORY }}
          ref: ${{ needs.prepare.outputs.source_sha }}
          fetch-depth: 0
          fetch-tags: true
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: Build mihomo
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOAMD64: ${{ matrix.goamd64 }}
          GOARM: ${{ matrix.goarm }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          build_time="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          go build -v -tags with_gvisor -trimpath \
            -ldflags "-X 'github.com/metacubex/mihomo/constant.Version=${VERSION}' -X 'github.com/metacubex/mihomo/constant.BuildTime=${build_time}' -w -s -buildid=" \
            -o mihomo
          chmod +x mihomo
      - name: Smoke test
        if: matrix.platform == 'linux/amd64'
        run: ./mihomo -v
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.pair }}
          path: mihomo
          if-no-files-found: error
          retention-days: 1

  build_image:
    name: Build image (${{ matrix.platform }})
    needs: [prepare, build_binary]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: linux/amd64, pair: linux-amd64 }
          - { platform: linux/arm/v6, pair: linux-arm-v6 }
          - { platform: linux/arm/v7, pair: linux-arm-v7 }
          - { platform: linux/arm64, pair: linux-arm64 }
    steps:
      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: binary-${{ matrix.pair }}
          path: image-root
      - name: Prepare image context
        working-directory: image-root
        run: |
          set -euo pipefail
          chmod +x mihomo
          cat > Dockerfile <<'DOCKERFILE'
          FROM alpine:latest
          LABEL org.opencontainers.image.source="https://github.com/MetaCubeX/mihomo"
          RUN apk add --no-cache ca-certificates tzdata iptables ip6tables && \
              mkdir -p /root/.config/mihomo && \
              wget -O /root/.config/mihomo/geoip.metadb https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.metadb && \
              wget -O /root/.config/mihomo/geosite.dat https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat && \
              wget -O /root/.config/mihomo/geoip.dat https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat
          COPY mihomo /mihomo
          VOLUME ["/root/.config/mihomo/"]
          ENTRYPOINT ["/mihomo"]
          DOCKERFILE
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.prepare.outputs.image }}
          labels: |
            org.opencontainers.image.title=mihomo
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            org.opencontainers.image.revision=${{ needs.prepare.outputs.source_sha }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: image-root
          file: image-root/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ needs.prepare.outputs.image }},push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge_image:
    name: Merge multi-platform image
    needs: [prepare, build_image]
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t "${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.docker_tag }}" \
            $(printf '${{ needs.prepare.outputs.image }}@sha256:%s ' *)
      - name: Inspect image
        run: docker buildx imagetools inspect "${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.docker_tag }}"
